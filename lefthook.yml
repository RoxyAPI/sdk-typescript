pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx}"
      run: bun run check --staged
      stage_fixed: true
    typecheck:
      run: bun typecheck
    docs-sync:
      glob: "{specs/openapi.json,scripts/tag-descriptions.ts,scripts/sync-docs.ts,docs/llms-full.txt}"
      run: bun run docs:sync && git add README.md AGENTS.md docs/llms-full.txt
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun typecheck
      priority: 1
    biome-full:
      run: bun run check
      priority: 2
    docs-drift:
      run: bun run docs:sync && git diff --exit-code -- README.md AGENTS.md docs/llms-full.txt || { echo "✗ README.md/AGENTS.md/llms-full.txt drifted from spec — commit the sync output"; exit 1; }
      priority: 3
    test:
      run: bun run test
      priority: 4
